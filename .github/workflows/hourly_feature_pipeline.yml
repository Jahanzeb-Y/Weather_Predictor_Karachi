name: Hourly AQI Feature Pipeline

on:
  schedule:
    # Runs exactly at the start of every hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to trigger it manually via the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set Up Python Engine
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests hopsworks==4.7.*

    - name: Execute Feature Pipeline Script
      env:
        HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
      run: python feature_pipeline.py